<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- ====== Brand mark (tooth + wave) ====== -->
  <symbol id="i-mark" viewBox="0 0 100 80">
    <path d="M50 14c-9-10-22-12-30-6C9 16 6 30 12 46c4 11 9 22 14 22 6 0 6-12 12-12s7 12 13 12c5 0 10-12 14-23 6-15 3-29-8-37-8-6-21-3-30 6Z"
          fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
  </symbol>

  <!-- ====== Implante ====== -->
  <symbol id="i-implante" viewBox="0 0 64 64">
    <path d="M22 8h20l-2 8H24l-2-8Z" fill="currentColor"/>
    <rect x="28" y="14" width="8" height="6" fill="currentColor"/>
    <path d="M30 20h4l-1 10h-2l-1-10Z" fill="currentColor"/>
    <path d="M28 30h8l-1 8h-6l-1-8ZM29 38h6l-1 8h-4l-1-8ZM30 46h4l-2 12-2-12Z" fill="currentColor"/>
    <g opacity="0.55"><path d="M26 22h12M27 26h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></g>
  </symbol>

  <!-- ====== Ortodoncia (alineador + brackets) ====== -->
  <symbol id="i-ortodoncia" viewBox="0 0 64 64">
    <path d="M12 26c0-6 9-10 20-10s20 4 20 10c0 10-8 22-20 22S12 36 12 26Z"
          fill="none" stroke="currentColor" stroke-width="3"/>
    <path class="svg-draw" pathLength="1" d="M18 28h28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <g fill="currentColor">
      <rect x="20" y="24" width="5" height="8" rx="1.5"/>
      <rect x="29.5" y="24" width="5" height="8" rx="1.5"/>
      <rect x="39" y="24" width="5" height="8" rx="1.5"/>
    </g>
  </symbol>

  <!-- ====== Estética (diente + brillo) ====== -->
  <symbol id="i-estetica" viewBox="0 0 64 64">
    <path d="M32 12c-6-6-14-7-19-3-7 6-9 16-5 26 3 7 6 15 9 15 4 0 4-8 8-8s4 8 8 8c3 0 6-8 9-15 4-10 2-20-5-26-5-4-13-3-19 3Z"
          fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/>
    <g fill="currentColor">
      <path class="svg-sparkle" d="M48 14l1.6 4 4 1.6-4 1.6L48 27l-1.6-5.8-4-1.6 4-1.6L48 14Z"/>
      <path class="svg-sparkle s2" d="M22 20l1 2.6 2.6 1-2.6 1-1 2.6-1-2.6-2.6-1 2.6-1 1-2.6Z"/>
      <circle class="svg-sparkle s3" cx="40" cy="30" r="2"/>
    </g>
  </symbol>

  <!-- ====== Prótesis / laboratorio (escaneo CAD-CAM) ====== -->
  <symbol id="i-protesis" viewBox="0 0 64 64">
    <rect x="12" y="14" width="40" height="36" rx="4" fill="none" stroke="currentColor" stroke-width="3"/>
    <path d="M22 40c0-7 4-12 10-12s10 5 10 12" fill="none" stroke="currentColor" stroke-width="3"/>
    <g fill="currentColor"><circle cx="26" cy="34" r="2"/><circle cx="32" cy="32" r="2"/><circle cx="38" cy="34" r="2"/></g>
    <rect class="svg-scan" x="14" y="18" width="36" height="3" rx="1.5" fill="currentColor" opacity="0.5"/>
  </symbol>

  <!-- ====== PADI (escudo + corazón) ====== -->
  <symbol id="i-padi" viewBox="0 0 64 64">
    <path d="M32 8l20 7v14c0 13-9 22-20 27-11-5-20-14-20-27V15l20-7Z"
          fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/>
    <path class="svg-heart" d="M32 42c-7-5-11-9-11-15 0-3.5 2.6-6 6-6 2.4 0 4 1.4 5 3 1-1.6 2.6-3 5-3 3.4 0 6 2.5 6 6 0 6-4 10-11 15Z" fill="currentColor"/>
  </symbol>

  <!-- ====== Odontología general (diente + check) ====== -->
  <symbol id="i-general" viewBox="0 0 64 64">
    <path d="M32 12c-6-6-14-7-19-3-7 6-9 16-5 26 3 7 6 15 9 15 4 0 4-8 8-8s4 8 8 8c3 0 6-8 9-15 4-10 2-20-5-26-5-4-13-3-19 3Z"
